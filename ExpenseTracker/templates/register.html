<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - ExpenseFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#191c1d",
                    "primary": "#3525cd",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e7e8e9",
                    "background": "#f8f9fa",
                    "on-secondary-fixed": "#002113",
                    "surface-bright": "#f8f9fa",
                    "inverse-surface": "#2e3132",
                    "inverse-primary": "#c3c0ff",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#4edea3",
                    "on-tertiary-fixed-variant": "#92002a",
                    "surface-variant": "#e1e3e4",
                    "primary-fixed-dim": "#c3c0ff",
                    "on-error": "#ffffff",
                    "on-primary-container": "#dad7ff",
                    "surface-container": "#edeeef",
                    "tertiary": "#95002b",
                    "surface": "#f8f9fa",
                    "outline-variant": "#c7c4d8",
                    "error-container": "#ffdad6",
                    "surface-tint": "#4d44e3",
                    "on-secondary": "#ffffff",
                    "secondary": "#006c49",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#464555",
                    "tertiary-container": "#bf0f3c",
                    "outline": "#777587",
                    "on-secondary-fixed-variant": "#005236",
                    "inverse-on-surface": "#f0f1f2",
                    "on-primary-fixed": "#0f0069",
                    "secondary-fixed": "#6ffbbe",
                    "on-tertiary": "#ffffff",
                    "on-background": "#191c1d",
                    "tertiary-fixed-dim": "#ffb2b7",
                    "on-tertiary-fixed": "#40000d",
                    "surface-dim": "#d9dadb",
                    "tertiary-fixed": "#ffdadb",
                    "secondary-container": "#6cf8bb",
                    "on-tertiary-container": "#ffd0d2",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "on-secondary-container": "#00714d",
                    "primary-container": "#4f46e5",
                    "on-primary-fixed-variant": "#3323cc",
                    "primary-fixed": "#e2dfff",
                    "surface-container-low": "#f3f4f5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "xl": "32px",
                    "lg": "24px",
                    "xs": "4px",
                    "margin-desktop": "40px",
                    "md": "16px",
                    "sm": "8px",
                    "base": "4px",
                    "gutter": "20px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "numeric-display": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "numeric-display": ["28px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-sm": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .auth-gradient {
            background: radial-gradient(circle at top left, #e2dfff 0%, #f8f9fa 40%, #ffffff 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop auth-gradient">
<main class="w-full max-w-[480px] z-10">
<!-- Logo/Brand Anchor -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">ExpenseFlow</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Create your professional finance account</p>
</div>
<!-- Registration Card -->
<div class="glass-card rounded-xl p-lg md:p-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.1),0_4px_6px_-4px_rgba(0,0,0,0.1)]">
<form  method="POST" action="#" class="space-y-lg">
    {% csrf_token %}
<!-- {% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %} -->
<!-- Full Name Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Fields Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="confirm_password">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock_reset</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-sm">
<input class="mt-1 w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary" id="terms" name="terms" required="" type="checkbox"/>
<label class="font-body-md text-on-surface-variant text-[13px]" for="terms">
                        I agree to the <a class="text-primary hover:underline font-semibold" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-semibold" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full py-3 bg-primary text-on-primary font-semibold rounded-lg hover:bg-primary/90 active:scale-[0.98] transition-all shadow-md shadow-primary/20 flex items-center justify-center gap-2" type="submit">
                    Sign Up
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="mt-lg pt-lg border-t border-outline-variant/30 text-center">
<p class="font-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="{% url 'login' %}">Log in here</a>
</p>
</div>
</div>
<!-- Trust Badges / Footer Info -->
<div class="mt-xl flex justify-center gap-xl opacity-60">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="font-label-md text-[11px] uppercase tracking-tighter">Bank-Level Security</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">cloud_done</span>
<span class="font-label-md text-[11px] uppercase tracking-tighter">Real-time Sync</span>
</div>
</div>
</main>
<!-- Decorative Elements (Ambient Background) -->
<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-secondary-fixed/10 rounded-full blur-[80px] pointer-events-none"></div>
<script>
        // Simple Interaction logic
        document.querySelector('form').addEventListener('submit', function(e) {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (pass !== confirm) {
                e.preventDefault();
                alert('Passwords do not match. Please check again.');
            }
        });

        // Focus visual effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-primary');
            });
        });
    </script>
</body></html>
