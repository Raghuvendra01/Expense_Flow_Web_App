<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ExpenseFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-error-container": "#93000a",

                        "error": "#ba1a1a",

                        "secondary-fixed": "#6ffbbe",

                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-tertiary-fixed": "#40000d",
                        "surface-dim": "#d9dadb",
                        "tertiary-fixed": "#ffdadb",
                        "secondary-container": "#6cf8bb",
                        "on-tertiary-container": "#ffd0d2",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "on-secondary-container": "#00714d",
                        "primary-container": "#4f46e5",
                        "on-primary-fixed-variant": "#3323cc",

                    "fontFamily": {

<style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .login-card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }
        .focused-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #3525cd22;
            border-color: #3525cd;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-margin-mobile">
<!-- Main Login Canvas -->
<main class="w-full max-w-[440px] animate-in fade-in duration-700">
<!-- Brand & Logo Container -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-[28px]" data-icon="payments">payments</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">ExpenseFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Professional Personal Finance</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-lg md:p-xl border border-outline-variant login-card">
<div class="mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Please enter your credentials to continue</p>
</div>
<form method="POST" action="#" class="space-y-md" >
    {%csrf_token%}
    {% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-md py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focused-input transition-all" id="email" name="email" placeholder="name@company.com" type="email" required/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-md py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focused-input transition-all" id="password" name="password" placeholder="••••••••" type="password"/  required>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me
<div class="flex items-center space-x-sm pt-xs">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary transition-colors" id="remember" name="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant select-none" for="remember">Stay signed in for 30 days</label>
</div> -->
<!-- Action Button -->
<button class="w-full mt-lg bg-primary text-white font-headline-sm text-headline-sm py-3 px-lg rounded-lg shadow-md hover:bg-primary-container active:scale-[0.98] transition-all duration-150" type="submit">
                    Sign In
                </button>
</form>
<!-- SSO / Social Divider -->
<div class="relative my-xl">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-md bg-surface-container-lowest font-label-md text-label-md text-outline uppercase tracking-widest">Or continue with</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-md px-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<img alt="Google Logo" class="w-5 h-5" data-alt="A clean, minimalist 3D render of a colorful G-suite style icon against a pristine white studio background. The lighting is soft and corporate, embodying a professional and high-tech financial software aesthetic with vibrant primary colors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4kWjVuzJZOy2LBia5V4ttSEDABuaTfodZhIa_U_33RKEMiIVx1k-kaH24HtZbZebVP--XwmCciJ8ZZBxCZwHUzqU6VaVGIcyzg1MFpNx1znpweFYmILFWEtmSpHFc675UiwlJk3XnTNmS2zPeHfw6Rjhcs_82vn6egk8Y6PEZtUzSn2u3t6E8aHN3wCYnYlY5zq7cl-CiY0TRCQv_w8XpbeXXOR1KgoF6BlN2g2Z9WXkvT50kx4VaYhujaJASIsCWiyp57Yq34qM"/>
<span class="font-label-md text-label-md text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-md px-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-[20px]" data-icon="domain" style="font-variation-settings: 'FILL' 1;">domain</span>
<span class="font-label-md text-label-md text-on-surface">SAML SSO</span>
</button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="/register/">Request Access</a>
</p>
</div>
<!-- Background Decorative Elements -->
<div class="fixed -bottom-32 -left-32 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-32 -right-32 w-96 h-96 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
</main>
<script>
        // Micro-interaction for password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('#password');
        
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.getAttribute('type') === 'password';
            passInput.setAttribute('type', isPass ? 'text' : 'password');
            toggleBtn.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });

        // Simple button active state feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('opacity-80');
                setTimeout(() => this.classList.remove('opacity-80'), 150);
            });
        });
    </script>
</body></html>
